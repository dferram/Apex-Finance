# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - apexfinance

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          GOOGLE_AI_API_KEY: dummy_key_for_build
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Zip artifact for deployment
        run: |
          if [ -d ".next/standalone" ]; then
            cd .next/standalone
            zip -r ../../release.zip .
            cd ../..
            cd .next/static
            zip -r ../../release.zip . -g
            cd ../..
          else
            zip -r release.zip .next public package.json package-lock.json server.js next.config.mjs node_modules
          fi
        shell: bash

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Unzip artifact for deployment
        run: unzip release.zip
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A2D3D31DD94E4B419733BB20DC4DB968 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F79896D01B44B218A8C39D533F81C2E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5485E625A08645EF99050524E9CECEEF }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'apexfinance'
          slot-name: 'Production'
          package: .
          startup-command: 'node server.js'
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: false
          